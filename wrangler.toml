name = "rapid-vimnote"
main = "src/worker.js"
compatibility_date = "2026-05-04"

[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/s/*"]

[[d1_databases]]
binding = "DB"
database_name = "rapid-vimnote"
database_id = "REPLACE_WITH_D1_DATABASE_ID"
